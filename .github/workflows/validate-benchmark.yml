name: Validate Benchmark

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python scripts/validate_dataset.py benchmark/*.jsonl
      - run: python scripts/validate_responses.py examples/example_model_response.jsonl
      - run: pytest
