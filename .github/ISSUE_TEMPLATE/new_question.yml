name: New question
description: Propose a new benchmark question.
title: "[New question]: "
labels: ["new-question"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - pn_junction
        - mos_capacitor
        - mosfet
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Proposed question
      description: Include assumptions, question text, and choices A through D. Do not include private answer-key material in public issues.
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill tested
      description: Example: conceptual reasoning, quantitative calculation, diagnostic reasoning.
