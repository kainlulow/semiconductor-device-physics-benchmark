name: Question error
description: Report a possible scientific, wording, or formatting issue in an existing benchmark question.
title: "[Question error]: "
labels: ["question-error"]
body:
  - type: input
    id: question-id
    attributes:
      label: Question ID
      description: The stable benchmark question ID.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: Describe the ambiguity, error, or proposed correction.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting reasoning or reference
      description: Explain the device-physics reasoning behind the proposed correction.
